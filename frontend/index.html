<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SecurePay</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-container">
    <div class="card auth-card">

        <div class="logo-intro">
            <div class="circle">
                <div class="sqr">🔷</div>
            </div>
            <h1>SecurePay</h1>
        </div>

        <div class="head">
            <h2>Welcome Back</h2>
            <p class="sub">Sign in to access your secure wallet</p>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="abcd@gmail.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>

        <p id="errorMsg" class="error-msg"></p>
        <button class="primary-btn" onclick="login()">Sign In</button>

        <p class="link">
            Don't have an account? 
            <a href="signup.html">Create one</a>
        </p>

    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
