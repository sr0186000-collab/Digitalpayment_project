<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Money - SecurePay</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="navbar">
    <div id="sidebar" class="sidebar">
        <span onclick="goTo('dashboard.html')">Dashboard</span>
        <span onclick="goTo('send.html')">Send / Add</span>
        <span onclick="goTo('history.html')">History</span>
    </div>

    <div class="dev">
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
        <div class="logo">🔷 SecurePay</div>

        <nav class="nav-links">
            <span onclick="goTo('dashboard.html')">Dashboard</span>
            <span class="active">Send / Add</span>
            <span onclick="goTo('history.html')">History</span>
        </nav>
    </div>

    <div class="user">
        <div class="icon">
            <div class="avatar" id="avatar"></div>
            <span id="username"></span>
        </div>
        <div class="line"></div>
        <button onclick="logout()">Logout</button>
    </div>

</header>

<main class="container">

    <div class="page-header">
        <h1>Send Money</h1>
        <p id="balance">Balance: ₹0</p>
    </div>

    <div class="switch-box">
        <button class="active">Send Money</button>
    </div>

    <div class="rsa-box">
        <h3>🔒 RSA Encryption Active</h3>
        <p>
            Your transaction is encrypted using RSA before being stored securely.
        </p>
    </div>

    <div class="form-box">

        <div class="form-group">
            <label>Recipient Number</label>
            <input type="text" id="phone" placeholder="Enter number">
        </div>

        <div class="form-group">
            <label>Amount</label>
            <input type="number" id="amount" placeholder="₹ 0.00">
        </div>

        <div class="form-group">
            <label>Note (optional)</label>
            <input type="text" id="note" placeholder="Coffee, rent, etc.">
        </div>

        <button class="send-btn" onclick="sendMoney()">🔒 Send Securely</button>

    </div>

</main>

<script src="js/app.js"></script>

</body>
</html>
