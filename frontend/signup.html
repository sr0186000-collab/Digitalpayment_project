<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - SecurePay</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-container">
    <div class="card auth-card">

        <div class="logo-intro">
            <div class="circle">
                <div class="sqr">🔷</div>
            </div>
            <h1>SecurePay</h1>
        </div>

        <div class="head">
            <h2>Create Account</h2>
            <p class="sub">Secure wallet with RSA encryption</p>
        </div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter Full Name">
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter Your Email id">
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="phone" placeholder="Enter Phone Number" maxlength="10" oninput="validatePhone()">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Create Strong password like joSH12#">
        </div>

        <p id="signupMsg" class="error-msg"></p>
        <button class="primary-btn" onclick="signup()">Create Account</button>

        <p class="link">
            Already have an account? 
            <a href="index.html">Sign in</a>
        </p>

    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
